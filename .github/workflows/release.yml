name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build all platforms
        env:
          VERSION: ${{ steps.version.outputs.version }}
          LDFLAGS: -s -w -X main.version=${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          targets=(
            "darwin   amd64"
            "darwin   arm64"
            "linux    amd64"
            "linux    arm64"
            "windows  amd64"
          )
          for target in "${targets[@]}"; do
            os=$(echo "$target"  | awk '{print $1}')
            arch=$(echo "$target" | awk '{print $2}')
            ext=""; [ "$os" = "windows" ] && ext=".exe"
            out="dist/qlaude_${os}_${arch}${ext}"
            echo "building $out"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -trimpath -ldflags "$LDFLAGS" -o "$out" ./cmd/qlaude
          done
          ls -lh dist/

      - name: Create checksums
        working-directory: dist
        run: sha256sum qlaude_* > checksums.txt && cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## qlaude ${{ github.ref_name }}

            Claude Code powered by GitHub Copilot.

            ### Install (one line)
            ```sh
            curl -fsSL https://raw.githubusercontent.com/papesambandour/qlaude-code/main/install.sh | bash
            ```

            ### Pre-built binaries
            | File | Platform |
            |------|----------|
            | `qlaude_darwin_arm64` | macOS Apple Silicon (M1/M2/M3/M4) |
            | `qlaude_darwin_amd64` | macOS Intel |
            | `qlaude_linux_amd64` | Linux x86_64 |
            | `qlaude_linux_arm64` | Linux ARM64 |
            | `qlaude_windows_amd64.exe` | Windows x86_64 |
          files: |
            dist/qlaude_*
            dist/checksums.txt
          generate_release_notes: false
